name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@10.33.0 --activate
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  docker:
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.ref_name }}-$(date +'%Y-%m-%d-%H%M%S')-prod" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v2
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: NODE_ENV=production
          tags: |
            chafah/nodejs-app:${{ steps.meta.outputs.tag }}
            chafah/nodejs-app:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - run: aws eks update-kubeconfig --name landmark-eks --region ${{ secrets.AWS_REGION }}
      - name: Update image tag in k8s manifest
        run: |
          sed -i "s|image:.*|image: chafah/nodejs-app:${{ needs.docker.outputs.image_tag }}|" k8s/05-service/deployment-service.yaml
      - run: kubectl apply -f k8s/05-service/deployment-service.yaml
