version: 2.1

orbs:
  aws-cli: circleci/aws-cli@4.1
  aws-eks: circleci/aws-eks@2.2
  kubernetes: circleci/kubernetes@1.3

executors:
  node:
    docker:
      - image: cimg/node:20.0
  docker-builder:
    docker:
      - image: cimg/base:2024.01

jobs:
  # ─────────────────────────────────────────────
  # BUILD & TEST
  # ─────────────────────────────────────────────
  build-and-test:
    executor: node
    steps:
      - checkout
      - run:
          name: Install pnpm
          command: |
            corepack enable
            corepack prepare pnpm@10.33.0 --activate
      - restore_cache:
          keys:
            - pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
      - run:
          name: Install dependencies
          command: pnpm install --no-frozen-lockfile
      - save_cache:
          key: pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - node_modules
      - run:
          name: Build
          command: pnpm build
      - run:
          name: Test
          command: pnpm test

  # ─────────────────────────────────────────────
  # DOCKER BUILD & PUSH (DEV)
  # ─────────────────────────────────────────────
  docker-build-dev:
    executor: docker-builder
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build and push dev image
          command: |
            BRANCH=$(echo $CIRCLE_BRANCH | sed 's/\//-/g')
            TAG="${BRANCH}-dev"
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build -t chafah/nodejs-app:${TAG} -t chafah/nodejs-app:dev .
            docker push chafah/nodejs-app:${TAG}
            docker push chafah/nodejs-app:dev

  # ─────────────────────────────────────────────
  # DOCKER BUILD & PUSH (STAGING)
  # ─────────────────────────────────────────────
  docker-build-staging:
    executor: docker-builder
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build and push staging image
          command: |
            BRANCH=$(echo $CIRCLE_BRANCH | sed 's/\//-/g')
            TAG="${BRANCH}-$(date +'%Y-%m-%d-%H%M%S')-staging"
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build --build-arg NODE_ENV=staging -t chafah/nodejs-app:${TAG} -t chafah/nodejs-app:staging .
            docker push chafah/nodejs-app:${TAG}
            docker push chafah/nodejs-app:staging
            echo "export IMAGE_TAG=${TAG}" >> $BASH_ENV

  # ─────────────────────────────────────────────
  # DOCKER BUILD & PUSH (PRODUCTION)
  # ─────────────────────────────────────────────
  docker-build-prod:
    executor: docker-builder
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build and push prod image
          command: |
            BRANCH=$(echo $CIRCLE_BRANCH | sed 's/\//-/g')
            TAG="${BRANCH}-$(date +'%Y-%m-%d-%H%M%S')-prod"
            echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker build --build-arg NODE_ENV=production -t chafah/nodejs-app:${TAG} -t chafah/nodejs-app:latest .
            docker push chafah/nodejs-app:${TAG}
            docker push chafah/nodejs-app:latest
            echo "export IMAGE_TAG=${TAG}" >> $BASH_ENV

  # ─────────────────────────────────────────────
  # DEPLOY TO STAGING (EKS)
  # ─────────────────────────────────────────────
  deploy-staging:
    executor: docker-builder
    steps:
      - checkout
      - aws-cli/setup
      - kubernetes/install-kubectl
      - run:
          name: Configure kubectl for staging EKS
          command: aws eks update-kubeconfig --name landmark-eks-stg --region $AWS_REGION
      - run:
          name: Update image and deploy
          command: |
            BRANCH=$(echo $CIRCLE_BRANCH | sed 's/\//-/g')
            TAG="${BRANCH}-$(date +'%Y-%m-%d-%H%M%S')-staging"
            sed -i "s|image:.*|image: chafah/nodejs-app:${TAG}|" k8s/05-service/deployment-service.yaml
            kubectl apply -f k8s/05-service/deployment-service.yaml

  # ─────────────────────────────────────────────
  # DEPLOY TO PRODUCTION (EKS)
  # ─────────────────────────────────────────────
  deploy-prod:
    executor: docker-builder
    steps:
      - checkout
      - aws-cli/setup
      - kubernetes/install-kubectl
      - run:
          name: Configure kubectl for production EKS
          command: aws eks update-kubeconfig --name landmark-eks --region $AWS_REGION
      - run:
          name: Update image and deploy
          command: |
            BRANCH=$(echo $CIRCLE_BRANCH | sed 's/\//-/g')
            TAG="${BRANCH}-$(date +'%Y-%m-%d-%H%M%S')-prod"
            sed -i "s|image:.*|image: chafah/nodejs-app:${TAG}|" k8s/05-service/deployment-service.yaml
            kubectl apply -f k8s/05-service/deployment-service.yaml

# ═══════════════════════════════════════════════
# WORKFLOWS
# ═══════════════════════════════════════════════
workflows:
  # ─────────────────────────────────────────────
  # CI (Dev) — all branches except main and release/*
  # ─────────────────────────────────────────────
  ci-dev:
    jobs:
      - build-and-test:
          filters:
            branches:
              ignore:
                - main
                - /^release\/.*/
                - /^hotfix\/.*/
      - docker-build-dev:
          requires:
            - build-and-test
          filters:
            branches:
              ignore:
                - main
                - /^release\/.*/
                - /^hotfix\/.*/

  # ─────────────────────────────────────────────
  # Deploy to Staging — release/* branches
  # ─────────────────────────────────────────────
  deploy-to-staging:
    jobs:
      - build-and-test:
          filters:
            branches:
              only: /^release\/.*/
      - docker-build-staging:
          requires:
            - build-and-test
          filters:
            branches:
              only: /^release\/.*/
      - deploy-staging:
          requires:
            - docker-build-staging
          filters:
            branches:
              only: /^release\/.*/

  # ─────────────────────────────────────────────
  # Deploy to Production — main and hotfix/* branches
  # ─────────────────────────────────────────────
  deploy-to-prod:
    jobs:
      - build-and-test:
          filters:
            branches:
              only:
                - main
                - /^hotfix\/.*/
      - docker-build-prod:
          requires:
            - build-and-test
          filters:
            branches:
              only:
                - main
                - /^hotfix\/.*/
      - deploy-prod:
          requires:
            - docker-build-prod
          filters:
            branches:
              only:
                - main
                - /^hotfix\/.*/
