# =============================================================================
# ServiceAccount — the identity for pods
# =============================================================================
# A ServiceAccount is like a "user account" but for pods.
# It determines what the pod is allowed to do inside the cluster.
# Without a custom SA, pods use the "default" SA which has no permissions.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: landmark-app-sa
  namespace: landmark-devops
  annotations:
    # For AWS IAM Roles for Service Accounts (IRSA)
    eks.amazonaws.com/role-arn: arn:aws:iam::075120018043:role/landmark-app-role

---
# =============================================================================
# Role — defines WHAT actions are allowed on WHICH resources
# =============================================================================
# A Role is namespace-scoped. It only grants permissions within its namespace.
# Think of it as a job description: "you can read configmaps and secrets"
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: landmark-app-role
  namespace: landmark-devops
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]

---
# =============================================================================
# RoleBinding — connects the Role to the ServiceAccount
# =============================================================================
# Without a RoleBinding, the Role exists but nobody has those permissions.
# The RoleBinding says: "landmark-app-sa gets the landmark-app-role permissions"
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: landmark-app-rolebinding
  namespace: landmark-devops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: landmark-app-role
subjects:
  - kind: ServiceAccount
    name: landmark-app-sa
    namespace: landmark-devops

---
# =============================================================================
# Pod that uses the ServiceAccount
# =============================================================================
# By setting serviceAccountName, this pod inherits the permissions
# defined in the Role above. It can read configmaps, secrets, and pods.
# =============================================================================
apiVersion: v1
kind: Pod
metadata:
  name: landmark-app-pod
  namespace: landmark-devops
  labels:
    app: landmark-app
spec:
  serviceAccountName: landmark-app-sa    # <-- Assigns the SA to this pod
  automountServiceAccountToken: true     # Mounts the SA token at /var/run/secrets/
  containers:
    - name: app
      image: landmark-devops:latest
      ports:
        - containerPort: 3000

---
# =============================================================================
# Deployment that uses the ServiceAccount
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landmark-app
  namespace: landmark-devops
  labels:
    app: landmark-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landmark-app
  template:
    metadata:
      labels:
        app: landmark-app
    spec:
      serviceAccountName: landmark-app-sa   # <-- All pods in this deployment use this SA
      containers:
        - name: app
          image: landmark-devops:latest
          ports:
            - containerPort: 3000
