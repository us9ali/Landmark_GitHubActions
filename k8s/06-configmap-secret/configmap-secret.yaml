# ConfigMap with multiple values
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: landmark-devops
data:
  NODE_ENV: production
  APP_PORT: "3000"
  LOG_LEVEL: info
  APP_NAME: landmark-app
  DB_HOST: db.landmark-devops.svc.cluster.local
  DB_PORT: "3306"

---
# ConfigMap with a single value
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-feature-flags
  namespace: landmark-devops
data:
  ENABLE_NOTIFICATIONS: "true"

---
# Secret for sensitive data
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: landmark-devops
type: Opaque
stringData:
  DATABASE_URL: mysql://landmark:landmark123@db:3306/landmark_devops
  API_KEY: my-super-secret-api-key
  JWT_SECRET: my-jwt-signing-secret

---
# Deployment using ConfigMap and Secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: landmark-app
  namespace: landmark-devops
  labels:
    app: landmark-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landmark-app
  template:
    metadata:
      labels:
        app: landmark-app
    spec:
      containers:
        - name: app
          image: landmark-devops:latest
          ports:
            - containerPort: 3000

          # --- Reference the ENTIRE configmap as env vars ---
          envFrom:
            - configMapRef:
                name: app-config          # All keys in app-config become env vars
            - configMapRef:
                name: app-feature-flags   # All keys in app-feature-flags become env vars
            - secretRef:
                name: app-secrets         # All keys in app-secrets become env vars

          # --- Reference SINGLE values from configmap/secret ---
          env:
            - name: MY_NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: MY_APP_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_PORT
            - name: MY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
